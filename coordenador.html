<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Atlas — Coordenação</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style.extra.css">
</head>
<body>

  <main class="container">
    <header class="page-header">
      <div>
        <h1>Coordenação</h1>
        <p id="user-welcome">Carregando...</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-outline btn--sm" onclick="logout()">Sair</button>
      </div>
    </header>

    <div class="grid-layout">

      <article class="card nav-card" onclick="abrirModal('tutores')">
        <span class="icon">👥</span>
        <h2>Tutores</h2>
        <p>Gerencie a lista de professores tutores.</p>
      </article>

      <article class="card nav-card" onclick="abrirModal('eletivas')">
        <span class="icon">💡</span>
        <h2>Eletivas</h2>
        <p>Aprove ou reprove propostas de eletivas.</p>
      </article>

      <article class="card nav-card" onclick="abrirModal('clubinhos')">
        <span class="icon">🤝</span>
        <h2>Clubinhos</h2>
        <p>Aprove ou reprove propostas de clubinhos.</p>
      </article>

      <article class="card nav-card" onclick="abrirModal('periodos')">
        <span class="icon">📅</span>
        <h2>Períodos e Vagas</h2>
        <p>Configure datas e vagas do ano letivo.</p>
      </article>

    </div>
  </main>

  <!-- Modal -->
  <div id="modal-container" class="modal-overlay">
    <div class="modal-content">
      <header class="modal-header">
        <h2 id="modal-title">Título</h2>
        <button class="close-btn" onclick="fecharModal()">&times;</button>
      </header>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="supabase-cdn.js"></script>
  <script src="config.js"></script>
  <script src="supabase.js"></script>
  <script src="utils.js"></script>
  <script src="coordenador.js"></script>
  <footer class="dev-footer">Versão em desenvolvimento</footer>
</body>
</html>
