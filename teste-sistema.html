<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Testes de Sistema - Portal Atlas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .controls {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #dee2e6;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .console {
            background: #1e1e1e;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            padding: 20px;
            height: 500px;
            overflow-y: auto;
            border-radius: 6px;
            margin: 20px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }
        
        .console-line {
            margin: 5px 0;
            line-height: 1.4;
        }
        
        .success { color: #4caf50; }
        .error { color: #ff6b6b; }
        .warning { color: #ffb300; }
        .info { color: #2196f3; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #667eea;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .stat-card h3 {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .stat-card .value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-card.success .value { color: #4caf50; }
        .stat-card.error .value { color: #ff6b6b; }
        .stat-card.warning .value { color: #ffb300; }
        
        .section {
            border-top: 1px solid #e9ecef;
        }
        
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧪 Testes de Sistema</h1>
            <p>Portal Atlas - Análise de Falhas Lógicas</p>
        </div>
        
        <div class="controls">
            <button class="btn-primary" onclick="executarTodosTestes()">
                ▶️ Executar Todos os Testes
            </button>
            <button class="btn-secondary" onclick="limparConsole()">
                🗑️ Limpar Console
            </button>
            <button class="btn-secondary" onclick="exportarResultados()">
                📥 Exportar Resultados
            </button>
            <button class="btn-danger" onclick="location.reload()">
                🔄 Recarregar Página
            </button>
        </div>
        
        <div class="stats">
            <div class="stat-card success">
                <h3>✅ Passou</h3>
                <div class="value" id="stat-passed">0</div>
            </div>
            <div class="stat-card error">
                <h3>❌ Falhou</h3>
                <div class="value" id="stat-failed">0</div>
            </div>
            <div class="stat-card warning">
                <h3>📋 Total</h3>
                <div class="value" id="stat-total">0</div>
            </div>
            <div class="stat-card info">
                <h3>📈 Taxa</h3>
                <div class="value" id="stat-rate">0%</div>
            </div>
        </div>
        
        <div style="padding: 20px;">
            <h2>📊 Console de Testes</h2>
            <div class="console" id="console"></div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script>
        // Referência ao console
        const consoleEl = document.getElementById('console');
        
        // Sobrescrever console.log
        const originalLog = console.log;
        const originalWarn = console.warn;
        const originalError = console.error;
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToConsole(args.join(' '), 'info');
        };
        
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            addToConsole(args.join(' '), 'warning');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToConsole(args.join(' '), 'error');
        };
        
        function addToConsole(text, type = 'info') {
            const line = document.createElement('div');
            line.className = `console-line ${type}`;
            line.textContent = text;
            consoleEl.appendChild(line);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }
        
        function limparConsole() {
            consoleEl.innerHTML = '';
            document.getElementById('stat-passed').textContent = '0';
            document.getElementById('stat-failed').textContent = '0';
            document.getElementById('stat-total').textContent = '0';
            document.getElementById('stat-rate').textContent = '0%';
        }
        
        function atualizarStats() {
            if (typeof TESTES !== 'undefined') {
                document.getElementById('stat-passed').textContent = TESTES.passou;
                document.getElementById('stat-failed').textContent = TESTES.falhou;
                document.getElementById('stat-total').textContent = TESTES.executados;
                
                const rate = TESTES.executados > 0 
                    ? ((TESTES.passou / TESTES.executados) * 100).toFixed(1)
                    : 0;
                document.getElementById('stat-rate').textContent = rate + '%';
            }
        }
        
        function exportarResultados() {
            const resultado = `
TESTE DE SISTEMA - PORTAL ATLAS
Data: ${new Date().toLocaleString('pt-BR')}
================================================

ESTATÍSTICAS:
- Total: ${TESTES.executados}
- Passou: ${TESTES.passou}
- Falhou: ${TESTES.falhou}
- Taxa: ${((TESTES.passou / TESTES.executados) * 100).toFixed(1)}%

DETALHES:
${TESTES.resultados.map(r => `
[${r.severidade}] ${r.condicao ? '✅' : '❌'} ${r.mensagem}
`).join('')}

CONSOLE:
${consoleEl.innerText}
`;
            
            const blob = new Blob([resultado], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `teste-sistema-${new Date().getTime()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // Monitorar mudanças nos testes
        const interval = setInterval(atualizarStats, 500);
        
        // Limpar console ao carregar
        window.addEventListener('load', () => {
            consoleEl.innerHTML = '';
            consoleEl.innerHTML += '<div class="console-line info">✅ Página carregada. Clique "Executar Todos os Testes" para começar.</div>';
        });
    </script>
    
    <!-- Carregar script de testes -->
    <script src="teste-sistema.js"></script>
</body>
</html>
