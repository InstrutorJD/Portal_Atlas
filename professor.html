<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Atlas — Professor</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style.extra.css">
</head>
<body>

  <main class="container">
    <header class="page-header">
      <div>
        <h1>Painel do Professor</h1>
        <p id="user-welcome">Carregando...</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-outline btn--sm" onclick="logout()">Sair</button>
      </div>
    </header>

    <div class="grid-layout grid-layout--2">
      <article class="card nav-card" onclick="abrirModal('minhas-eletivas')">
        <span class="icon">💡</span>
        <h2>Minhas Eletivas</h2>
        <p>Gerencie e acompanhe suas eletivas.</p>
      </article>

      <article class="card nav-card" onclick="abrirModal('nova-eletiva')">
        <span class="icon">➕</span>
        <h2>Propor Eletiva</h2>
        <p>Envie uma nova eletiva para aprovação.</p>
      </article>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal-container" class="modal-overlay">
    <div class="modal-content">
      <header class="modal-header">
        <h2 id="modal-title">Título</h2>
        <button class="close-btn" onclick="fecharModal()">&times;</button>
      </header>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="supabase.js"></script>
  <script src="utils.js"></script>
  <script src="professor.js"></script>
</body>
</html>
