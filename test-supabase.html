<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste Supabase — Portal Atlas</title>
  <style>
    body { font-family: system-ui; padding: 20px; max-width: 800px; margin: 0 auto; }
    .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
    .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; }
    pre { background: #f4f4f4; padding: 10px; border-radius: 4px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>🧪 Teste de Conexão — Supabase Portal Atlas</h1>
  
  <div id="tests"></div>
  
  <script src="supabase-cdn.js"></script>
  <script src="config.js"></script>
  <script>
    const testResults = [];
    const testsDiv = document.getElementById('tests');
    
    function addTest(name, success, message, details = '') {
      const status = success ? 'success' : 'error';
      const icon = success ? '✅' : '❌';
      const html = `
        <div class="status ${status}">
          <strong>${icon} ${name}</strong>
          <p>${message}</p>
          ${details ? `<pre>${details}</pre>` : ''}
        </div>
      `;
      testsDiv.innerHTML += html;
      testResults.push({ name, success });
    }
    
    // Teste 1: Credenciais carregadas
    const urlOk = !!window.VITE_SUPABASE_URL;
    const keyOk = !!window.VITE_SUPABASE_ANON_KEY;
    addTest(
      'Credenciais carregadas',
      urlOk && keyOk,
      urlOk && keyOk 
        ? 'config.js foi carregado com sucesso'
        : 'Credenciais não encontradas',
      `URL: ${window.VITE_SUPABASE_URL ? '✓' : '✗'}\nKEY: ${window.VITE_SUPABASE_ANON_KEY ? '✓ (primeiros 20 chars: ' + window.VITE_SUPABASE_ANON_KEY.substring(0, 20) + '...)' : '✗'}`
    );
    
    // Teste 2: Biblioteca Supabase carregada
    const supOk = typeof window.supabase !== 'undefined';
    addTest(
      'Biblioteca Supabase.js carregada',
      supOk,
      supOk ? 'supabase-js v2 disponível' : 'Supabase.js não encontrado'
    );
    
    // Teste 3: supabase.js carregado
    const supajsOk = typeof window.SUPABASE_ENABLED !== 'undefined';
    addTest(
      'supabase.js carregado',
      supajsOk,
      supajsOk ? 'Script supabase.js executado com sucesso' : 'supabase.js não foi carregado',
      supajsOk ? `Status: SUPABASE_ENABLED = ${window.SUPABASE_ENABLED}` : ''
    );
    
    // Teste 4: Cliente Supabase inicializado
    const clientOk = typeof window.db !== 'undefined';
    addTest(
      'Cliente Supabase inicializado',
      clientOk,
      clientOk 
        ? `Cliente criado com sucesso (Modo: ${window.SUPABASE_ENABLED ? 'REAL' : 'MOCK'})`
        : 'Cliente não foi inicializado',
      clientOk ? `window.db disponível: ${typeof window.db}` : ''
    );
    
    // Teste 5: Funções exportadas
    const funcOk = typeof window.login === 'function' &&
                   typeof window.logout === 'function' &&
                   typeof window.getSessao === 'function' &&
                   typeof window.getPerfil === 'function';
    addTest(
      'Funções principais exportadas',
      funcOk,
      funcOk ? 'Todas as funções disponíveis' : 'Faltam funções'
    );
    
    // Resumo
    const successCount = testResults.filter(t => t.success).length;
    const totalTests = testResults.length;
    const allOk = successCount === totalTests;
    
    setTimeout(() => {
      const summary = `
        <div class="status ${allOk ? 'success' : 'info'}" style="margin-top: 20px;">
          <strong>${allOk ? '🎉 Tudo pronto!' : '⚠️ Verificação necessária'}</strong>
          <p>${successCount}/${totalTests} testes passaram</p>
          ${allOk ? '<p>Acesse <a href="index.html">index.html</a> para testar o login.</p>' : ''}
        </div>
      `;
      testsDiv.innerHTML += summary;
    }, 500);
  </script>
</body>
</html>
