<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Atlas — Painel do Aluno</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style.extra.css">
</head>
<body>

  <main class="container">
    <header class="page-header">
      <div>
        <h1>Painel do Aluno</h1>
        <p id="user-welcome">Carregando...</p>
      </div>
      <div class="header-actions">
        <div id="status-geral" class="user-badge">Verificando...</div>
        <button class="btn btn-outline btn--sm" onclick="logout()">Sair</button>
      </div>
    </header>

    <div class="grid-layout">
      <article class="card nav-card" id="card-tutoria" onclick="abrirModal('tutoria')">
        <span class="icon">📖</span>
        <h2>Tutoria</h2>
        <p>Escolha seu professor orientador.</p>
        <span class="card-status" id="status-tutoria"></span>
      </article>

      <article class="card nav-card" id="card-eletivas" onclick="abrirModal('eletivas')">
        <span class="icon">💡</span>
        <h2>Eletivas</h2>
        <p>Selecione sua disciplina complementar.</p>
        <span class="card-status" id="status-eletiva"></span>
      </article>

      <article class="card nav-card" id="card-clubinhos" onclick="abrirModal('clubinhos')">
        <span class="icon">🤝</span>
        <h2>Clubinhos</h2>
        <p>Crie ou participe de grupos de interesse.</p>
        <span class="card-status" id="status-clubinho"></span>
      </article>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal-container" class="modal-overlay">
    <div class="modal-content">
      <header class="modal-header">
        <h2 id="modal-title">Título</h2>
        <button class="close-btn" onclick="fecharModal()">&times;</button>
      </header>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="supabase.js"></script>
  <script src="utils.js"></script>
  <script src="app.js"></script>
</body>
</html>
